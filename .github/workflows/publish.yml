name: AI News Publisher

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 6 * * *"
    - cron: "0 8 * * *"
    - cron: "0 10 * * *"
    - cron: "0 13 * * *"
    - cron: "0 17 * * *"
    - cron: "0 19 * * *"
    - cron: "0 21 * * *"

  workflow_dispatch:
    inputs:
      articles_count:
        description: "Number of articles to publish (default: 1)"
        required: false
        default: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout with full history so we can pull+push cleanly ────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            feedparser \
            requests \
            "google-genai>=1.0.0" \
            python-dateutil

      # ── 4. Run the pipeline ──────────────────────────────────────────────
      - name: Run AI News Pipeline
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          WP_URL:           ${{ secrets.WP_URL }}
          WP_USER:          ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:  ${{ secrets.WP_APP_PASSWORD }}
          PEXELS_API_KEY:   ${{ secrets.PEXELS_API_KEY }}
          GNEWS_API_KEY:    ${{ secrets.GNEWS_API_KEY }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_count || '1' }}
        run: python main.py

      # ── 5. Save run log as artifact ──────────────────────────────────────
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_number }}
          path: run_log.json
          retention-days: 30

      # ── 6. Commit published_articles.json back to repo ───────────────────
      # Pull first to handle concurrent runs, then push with retry.
      - name: Commit published articles
        if: success()
        run: |
          git config user.name  "AI News Bot"
          git config user.email "bot@noreply.github.com"

          # Pull latest (handles case where another run pushed while we ran)
          git pull --rebase origin main || true

          git add published_articles.json run_log.json || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0

          git commit -m "chore: update published articles [skip ci]"

          # Retry push up to 3 times to handle race conditions
          for i in 1 2 3; do
            git push && echo "Push succeeded" && break
            echo "Push attempt $i failed, pulling and retrying..."
            git pull --rebase origin main || true
            sleep $((i * 5))
          done
